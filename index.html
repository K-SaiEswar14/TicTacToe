<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- SETUP SCREEN -->
  <div class="screen" id="setupScreen">
    <div class="setup-card">
      <h1 class="logo">Tic <span>Tac</span> Toe</h1>
      <p class="tagline">The classic battle — who will dominate the grid?</p>

      <div class="mode-toggle">
        <button class="mode-btn active" id="pvpBtn" onclick="selectMode('pvp')">👥 2 Players</button>
        <button class="mode-btn" id="aiBtn" onclick="selectMode('ai')">🤖 vs AI</button>
      </div>

      <div class="name-inputs">
        <div class="input-group">
          <label>✕ Player X</label>
          <input type="text" id="nameX" placeholder="Enter name..." maxlength="12" />
        </div>
        <div class="input-group" id="nameOGroup">
          <label>○ Player O</label>
          <input type="text" id="nameO" placeholder="Enter name..." maxlength="12" />
        </div>
      </div>

      <div class="difficulty-section" id="difficultySection" style="display:none;">
        <label>AI Difficulty</label>
        <div class="diff-btns">
          <button class="diff-btn active" onclick="selectDiff(this,'easy')">Easy</button>
          <button class="diff-btn" onclick="selectDiff(this,'medium')">Medium</button>
          <button class="diff-btn" onclick="selectDiff(this,'hard')">Hard</button>
        </div>
      </div>

      <button class="start-btn" onclick="startGame()">🚀 Start Game</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div class="screen hidden" id="gameScreen">
    <div class="game-wrapper">

      <div class="game-header">
        <button class="back-btn" onclick="goHome()">← Home</button>
        <h1 class="logo small">Tic <span>Tac</span> Toe</h1>
        <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</button>
      </div>

      <!-- Score Board -->
      <div class="scoreboard">
        <div class="score-box x-box">
          <div class="score-symbol">✕</div>
          <div class="score-name" id="scoreNameX">Player X</div>
          <div class="score-val" id="scoreX">0</div>
        </div>
        <div class="score-box draw-box">
          <div class="score-symbol">🤝</div>
          <div class="score-name">Draws</div>
          <div class="score-val" id="scoreD">0</div>
        </div>
        <div class="score-box o-box">
          <div class="score-symbol">○</div>
          <div class="score-name" id="scoreNameO">Player O</div>
          <div class="score-val" id="scoreO">0</div>
        </div>
      </div>

      <!-- Turn Indicator -->
      <div class="turn-indicator" id="turnIndicator">
        <span id="turnText">Player X's turn</span>
      </div>

      <!-- Board -->
      <div class="board" id="board">
        <div class="cell" id="c0"></div>
        <div class="cell" id="c1"></div>
        <div class="cell" id="c2"></div>
        <div class="cell" id="c3"></div>
        <div class="cell" id="c4"></div>
        <div class="cell" id="c5"></div>
        <div class="cell" id="c6"></div>
        <div class="cell" id="c7"></div>
        <div class="cell" id="c8"></div>
      </div>

      <!-- Result Overlay -->
      <div class="result-overlay hidden" id="resultOverlay">
        <div class="result-card" id="resultCard">
          <div class="result-emoji" id="resultEmoji">🎉</div>
          <div class="result-text" id="resultText">Player X Wins!</div>
          <div class="result-sub" id="resultSub"></div>
          <div class="result-btns">
            <button class="btn-play-again" onclick="resetBoard()">▶ Play Again</button>
            <button class="btn-home" onclick="goHome()">🏠 Home</button>
          </div>
        </div>
      </div>

      <button class="restart-btn" onclick="resetBoard()">↺ Restart Round</button>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
